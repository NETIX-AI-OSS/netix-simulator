# GENERATED by `simulator --emit-republisher-config` — do not edit by hand.
# Regenerate whenever the simulator config changes so BACnet addresses stay in sync.

version = 2
protocol = "bacnet"

[connections.bacnet]
discover_all_interfaces = true
port = 0
broadcast_address = "255.255.255.255"
discovery_window_ms = 3000
apdu_timeout_ms = 2000
poll_concurrency = 8
device_backoff_max_secs = 300
bind_failure_policy = "skip"

[mqtt]
host = "REPLACE_WITH_PLATFORM_MQTT_HOST"
port = 8883
use_tls = true
client_id = "netix-republisher"
topic_prefix = "Netix/Site"
health_topic = "Netix/Site/_health/republisher"
payload_format = "netix_envelope"
device_topic_prefix = "/Netix/Sim/Device"
retain = false
keep_alive_secs = 30
autostart = true

