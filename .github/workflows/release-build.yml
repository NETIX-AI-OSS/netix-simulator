name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-gate:
    name: Test gate (Linux x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked

  build-unix:
    name: Build ${{ matrix.artifact_name }}
    needs: test-gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            bin: simulator
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            artifact_name: linux-aarch64
            bin: simulator
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
            bin: simulator
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-aarch64
            bin: simulator
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Install cross-compilation toolchain (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu zip
      - name: Install packaging tools
        if: matrix.target != 'aarch64-unknown-linux-gnu' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zip
      - name: Install packaging tools (macOS)
        if: runner.os == 'macOS'
        run: brew install zip
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          package="netix-simulator-${tag}-${{ matrix.artifact_name }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${package}/"
          cp README.md "dist/${package}/" 2>/dev/null || true
          (cd "dist/${package}" && zip -r "../${package}.zip" .)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: netix-simulator-${{ matrix.artifact_name }}
          path: dist/*.zip
          if-no-files-found: error

  windows:
    name: Build Windows executable (signed)
    runs-on: windows-2025-vs2026
    timeout-minutes: 60
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Build release binary
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --locked --release
      - name: Azure login (OIDC, no secrets stored)
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign with Azure Trusted Signing
        uses: azure/trusted-signing-action@c0ae2c1d0c1847ab81ac0ab8521bee597cfedd30 # v2
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\target\release
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com/
          timestamp-digest: SHA256
      - name: Verify signature
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "target\release\simulator.exe"
          $sig | Format-List
          if ($sig.Status -ne 'Valid') {
            Write-Error "Signature for simulator.exe is '$($sig.Status)', expected 'Valid'"
            exit 1
          }
      - name: Package
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $package = "netix-simulator-$tag-windows-x86_64"
          $dir = Join-Path "dist" $package
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "target\release\simulator.exe" $dir
          if (Test-Path "README.md") { Copy-Item "README.md" $dir }
          Compress-Archive -Path (Join-Path $dir "*") -DestinationPath "dist\$package.zip" -Force
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: netix-simulator-windows-x86_64
          path: dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [build-unix, windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/artifacts
          merge-multiple: true
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist/artifacts
          find . -name '*.zip' -type f | sort | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            dist/artifacts/**/*.zip
            dist/artifacts/**/SHA256SUMS
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prerelease=""
          if [[ "${tag}" == *-* ]]; then
            prerelease="--prerelease"
          fi
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --notes "Automated release build for ${tag}" ${prerelease}
          fi
          mapfile -d '' files < <(find dist/artifacts -name '*.zip' -print0)
          mapfile -d '' sums < <(find dist/artifacts -name 'SHA256SUMS' -print0)
          gh release upload "${tag}" "${files[@]}" "${sums[@]}" --clobber
          for asset in "Source code (zip)" "Source code (tar.gz)"; do
            gh release delete-asset "${tag}" "${asset}" --yes 2>/dev/null || true
          done
